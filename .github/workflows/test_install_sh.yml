name: "Test install.sh"

on:
  workflow_run:
    workflows: ["Update Release Version"] # runs after release
    types:
      - completed
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "install.sh"
      - "test/install_sh/**"
      - ".github/workflows/test_install_sh.yml"
  push:
    branches:
      - main
    paths:
      - "install.sh"
      - "test/install_sh/**"
      - ".github/workflows/test_install_sh.yml"

jobs:
  build_container:
    runs-on: ubuntu-latest
    env:
      # C07R9GSGKEU == #mondoo-ops
      SLACK_BOT_CHANNEL_ID: "C07R9GSGKEU"
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          # almalinux.Dockerfile
          - dockerfile: almalinux.Dockerfile
            target: almalinux8
          - dockerfile: almalinux.Dockerfile
            target: almalinux9
          # amazonlinux2.Dockerfile
          - dockerfile: amazonlinux2.Dockerfile
            target: amazonlinux2
          - dockerfile: amazonlinux2.Dockerfile
            target: amazonlinux2022
          # debian.Dockerfile
          - dockerfile: debian.Dockerfile
            target: debian9
          - dockerfile: debian.Dockerfile
            target: debian10
          - dockerfile: debian.Dockerfile
            target: debian11
          # opensuse_leap.Dockerfile
          - dockerfile: opensuse_leap.Dockerfile
            target: opensuse_leap154
          - dockerfile: opensuse_leap.Dockerfile
            target: opensuse_tumbleweed
          # redhat.Dockerfile
          - dockerfile: redhat.Dockerfile
            target: rhel8
          - dockerfile: redhat.Dockerfile
            target: rhel9
          # ubuntu.Dockerfile
          - dockerfile: ubuntu.Dockerfile
            target: ubuntu1404
          - dockerfile: ubuntu.Dockerfile
            target: ubuntu1604
          - dockerfile: ubuntu.Dockerfile
            target: ubuntu1804
          - dockerfile: ubuntu.Dockerfile
            target: ubuntu2004
          - dockerfile: ubuntu.Dockerfile
            target: ubuntu2204
    name: "install.sh (${{ matrix.target }})"
    steps:
      - name: Clone repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - id: slack
        if: github.event_name != 'pull_request'
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ env.SLACK_BOT_CHANNEL_ID }}"
            text: "GitHub Actions Run"
            attachments:
              - color: "#FFFF00"
                blocks:
                  - type: "section"
                    fields:
                      - type: "mrkdwn"
                        text: "<${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}|${{ github.workflow }} (${{ matrix.target }})>"
                      - type: "mrkdwn"
                        text: "*Status:*\n`In Progress`"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          image: tonistiigi/binfmt@sha256:d3b963f787999e6c0219a48dba02978769286ff61a5f4d26245cb6a6e5567ea3 # latest
          platforms: arm64,arm

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Copy install.sh into build context
        run: cp install.sh test/install_sh/

      - name: Build and test (${{ matrix.target }})
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: test/install_sh/${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          tags: |
            mondoohq/mondoo-install-test:${{ matrix.target }}

      - uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        if: always() && github.event_name != 'pull_request'
        with:
          method: chat.update
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ env.SLACK_BOT_CHANNEL_ID }}"
            ts: "${{ steps.slack.outputs.ts }}"
            text: "GitHub Actions Run"
            attachments:
              - color: "${{ job.status == 'success' && '#00FF00' || job.status == 'failure' && '#FF0000' || '#FFA500' }}"
                blocks:
                  - type: "section"
                    fields:
                      - type: "mrkdwn"
                        text: "<${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}|${{ github.workflow }} (${{ matrix.target }})>"
                      - type: "mrkdwn"
                        text: "*Status:*\n`${{ job.status }}`"
