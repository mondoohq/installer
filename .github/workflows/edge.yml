name: Release Mondoo Edge Container Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Mondoo client version'
        required: true

permissions: {}

jobs:
  build_container:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Build Docker
    steps:
      - name: Clean Version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          echo "VERSION=${INPUT_VERSION}" >> $GITHUB_ENV
          echo "version=${INPUT_VERSION}" >> $GITHUB_OUTPUT

      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          image: tonistiigi/binfmt@sha256:d3b963f787999e6c0219a48dba02978769286ff61a5f4d26245cb6a6e5567ea3 # latest
          platforms: arm64,arm

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push root images (alpine)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/386,linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7
          push: true
          build-args: |
            BASEURL=https://releases.mondoo.com/edge/mondoo/${{ steps.version.outputs.version }}
            VERSION=${{ steps.version.outputs.version }}
          target: root
          tags: |
            mondoo/client:edge-${{ steps.version.outputs.version }}
            mondoo/client:edge-latest

      - name: Build and push rootless images (alpine)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/386,linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7
          push: true
          build-args: |
            BASEURL=https://releases.mondoo.com/edge/mondoo/${{ steps.version.outputs.version }}
            VERSION=${{ steps.version.outputs.version }}
          target: rootless
          tags: |
            mondoo/client:edge-${{ steps.version.outputs.version }}-rootless
            mondoo/client:edge-latest-rootless
