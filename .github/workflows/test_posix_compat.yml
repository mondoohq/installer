---
name: POSIX Shell Compatibility

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'install.sh'
      - 'download.sh'
      - 'test/install_sh/test_params.sh'
      - '.github/workflows/test_posix_compat.yml'

permissions:
  contents: read

jobs:
  posix-sh-check:
    name: POSIX sh compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install checkbashisms
        run: sudo apt-get update && sudo apt-get install -y devscripts

      - name: Run checkbashisms on install.sh
        run: checkbashisms install.sh

      - name: Run ShellCheck in POSIX mode
        run: shellcheck -s sh -S warning install.sh

      - name: Verify shebang is #!/bin/sh
        run: |
          for f in install.sh; do
            head -1 "$f" | grep -q '^#!/bin/sh' || {
              echo "ERROR: $f shebang is not #!/bin/sh"
              exit 1
            }
          done

      - name: Parse with dash (syntax check)
        run: dash -n install.sh

      - name: Test parameter passing
        run: sh test/install_sh/test_params.sh
