name: "Test Release: Docker Containers"

on:
  workflow_call:
    inputs:
      version:
        description: "Version to test"
        required: true
        default: "9.0.0"
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version to test"
        required: true
        default: "9.0.0"

permissions:
  contents: read

jobs:
  mql-containers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: ["latest", "latest-ubi-rootless", "latest-rootless"]
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${INPUT_VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $INPUT_VERSION"
            exit 1
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
      - name: Testing mondoo/mql:${{ matrix.tag }}....
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
          IMAGE_TAG: ${{ matrix.tag }}
        run: |
          version=$(docker run --rm -v "$(pwd):/work" -w /work "mondoo/mql:${IMAGE_TAG}" version)
          echo "$version"
          echo "$version" | grep -q "$EXPECTED_VERSION"
  cnspec-containers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: ["latest", "latest-ubi-rootless", "latest-rootless"]
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${INPUT_VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $INPUT_VERSION"
            exit 1
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
      - name: Testing mondoo/cnspec:${{ matrix.tag }}....
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
          IMAGE_TAG: ${{ matrix.tag }}
        run: |
          version=$(docker run --rm -v "$(pwd):/work" -w /work "mondoo/cnspec:${IMAGE_TAG}" version)
          echo "$version"
          echo "$version" | grep -q "$EXPECTED_VERSION"

  mondoo-containers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: ["latest", "latest-ubi-rootless", "latest-rootless"]
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${INPUT_VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $INPUT_VERSION"
            exit 1
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
      - name: Testing mondoo/client:${{ matrix.tag }}....
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
          IMAGE_TAG: ${{ matrix.tag }}
        run: |
          version=$(docker run --rm -v "$(pwd):/work" -w /work "mondoo/client:${IMAGE_TAG}" version)
          echo "$version"
          echo "$version" | grep -q "$EXPECTED_VERSION"
