name: Update Release Version

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version that should be released'
        required: true
        default: '1.2.3'

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: 'main'
          fetch-depth: 0
      - name: Version from Workflow Dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          V=$(echo "${INPUT_VERSION}" | sed 's/v//g')
          echo "VERSION=${V}" >> $GITHUB_ENV
      - name: Version from Release Tag
        if: github.event_name == 'release'
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          V=$(echo "${TAG_NAME}" | sed 's/v//g')
          echo "VERSION=${V}" >> $GITHUB_ENV
      - name: Verify valid version
        id: vars
        run: |
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Commit VERSION file
        run: |
          echo ${VERSION} > VERSION
          echo "VERSION is $VERSION"
          git add VERSION
          git config --global user.email "tools@mondoo.com"
          git config --global user.name "Mondoo Tools"
          git commit -m "Update VERSION to $VERSION"
          git push
