name: Test Linux Packaging

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to test (e.g. 13.0.0-rc7)'
        required: true
        type: string
      releases-url:
        description: 'Releases base URL'
        required: false
        default: 'https://releases.mondoo.love'
        type: string
      self-upgrade-from:
        description: 'Version to self-upgrade from (e.g. 13.0.0-rc5); leave empty to skip'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to test'
        required: true
        type: string
      releases-url:
        description: 'Releases base URL'
        required: false
        default: 'https://releases.mondoo.love'
        type: string
      self-upgrade-from:
        description: 'Version to self-upgrade from; leave empty to skip'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  test-mondoo-pkg-and-upgrade:
    name: Mondoo pkg + Upgrade
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Run mondoo-pkg and upgrade tests
        env:
          VERSION: ${{ inputs.version }}
          RELEASES_URL: ${{ inputs.releases-url || 'https://releases.mondoo.love' }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          python3 test/auto_update/test_auto_update.py \
            --install-version "$VERSION" \
            --releases-url "$RELEASES_URL" \
            --skip-auto-update \
            --skip-self-upgrade

  test-auto-update:
    name: Auto-update
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Run auto-update tests
        env:
          VERSION: ${{ inputs.version }}
          RELEASES_URL: ${{ inputs.releases-url || 'https://releases.mondoo.love' }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          python3 test/auto_update/test_auto_update.py \
            --install-version "$VERSION" \
            --releases-url "$RELEASES_URL" \
            --skip-mondoo-pkg \
            --skip-upgrade \
            --skip-self-upgrade

  test-self-upgrade:
    name: Self-upgrade
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ inputs.self-upgrade-from != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Run self-upgrade tests
        env:
          VERSION: ${{ inputs.version }}
          RELEASES_URL: ${{ inputs.releases-url || 'https://releases.mondoo.love' }}
          SELF_UPGRADE_FROM: ${{ inputs.self-upgrade-from }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          if [[ -n "$SELF_UPGRADE_FROM" && ! "$SELF_UPGRADE_FROM" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid self-upgrade-from version: $SELF_UPGRADE_FROM"
            exit 1
          fi
          python3 test/auto_update/test_auto_update.py \
            --install-version "$VERSION" \
            --releases-url "$RELEASES_URL" \
            --skip-auto-update \
            --skip-mondoo-pkg \
            --skip-upgrade \
            --self-upgrade-from "$SELF_UPGRADE_FROM"
