name: Test Linux Packaging

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to test (e.g. 13.0.0-rc7)'
        required: true
        type: string
      releases-url:
        description: 'Releases base URL'
        required: false
        default: 'https://releases.mondoo.love'
        type: string
      self-upgrade-from:
        description: 'Version to self-upgrade from (e.g. 13.0.0-rc5); leave empty to skip'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to test'
        required: true
        type: string
      releases-url:
        description: 'Releases base URL'
        required: false
        default: 'https://releases.mondoo.love'
        type: string
      self-upgrade-from:
        description: 'Version to self-upgrade from; leave empty to skip'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  test-mondoo-pkg-and-upgrade:
    name: Mondoo pkg + Upgrade
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run mondoo-pkg and upgrade tests
        run: |
          pytest test/auto_update -m "mondoo_pkg or upgrade" -v \
            --install-version "${{ inputs.version }}" \
            --releases-url "${{ inputs.releases-url || 'https://releases.mondoo.love' }}"

  test-auto-update:
    name: Auto-update
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run auto-update tests
        run: |
          pytest test/auto_update -m auto_update -v \
            --install-version "${{ inputs.version }}" \
            --releases-url "${{ inputs.releases-url || 'https://releases.mondoo.love' }}"

  test-self-upgrade:
    name: Self-upgrade
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ inputs.self-upgrade-from != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run self-upgrade tests
        run: |
          pytest test/auto_update -m self_upgrade -v \
            --install-version "${{ inputs.version }}" \
            --releases-url "${{ inputs.releases-url || 'https://releases.mondoo.love' }}" \
            --self-upgrade-from "${{ inputs.self-upgrade-from }}"
