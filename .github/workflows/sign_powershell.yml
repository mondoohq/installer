name: Sign PowerShell Scripts

on:
  workflow_dispatch:
    inputs:
      skip-publish:
        description: "Skip publishing"
        required: false
        default: false
        type: boolean
      skip-upload:
        description: "Skip uploading signed artifacts to workflow"
        required: false
        default: false
        type: boolean
      use-test-cert:
        description: "Use test certificate profile (not publicly trusted)"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - "install.ps1"
      - "download.ps1"
      - "powershell/Mondoo.Installer/Mondoo.Installer.psm1"
      - "powershell/Mondoo.Installer/Mondoo.Installer.psd1"

# Once Azure Signing is live, remember to delete
# - "secrets.SM_CLIENT_CERT_FILE_B64
# - "secrets.SM_CLIENT_CERT_PASSWORD"
# - "secrets.SM_API_KEY"
# - "secrets.SM_HOST"
# - "secrets.SM_CODE_SIGNING_CERT_SHA1_HASH"
# - "secrets.SM_CERT_ALIAS"
# These where from the old Digicert setup
# and are no longer used.

permissions:
  # Required for OIDC to be generated
  id-token: write
  # Required for the commit back of the signed scripts
  contents: write
  # Required to open the PR with the signed scripts
  pull-requests: write

jobs:
  sign_scripts:
    name: Sign PowerShell scripts
    runs-on: windows-2025
    environment: prod
    # Skip the recursive trigger from this workflow's own merge commits.
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Sign powershell scripts') }}
    steps:
      - name: Dump all inputs
        env:
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: echo "$INPUTS_JSON"

      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # Use sparse checkout to only get the necessary files
          # This helps speed up the checkout process
          # Please ensure any new files that need signing are added here
          # and all the other tasks in this workflow.
          sparse-checkout: |-
            install.ps1
            download.ps1
            powershell/Mondoo.Installer/Mondoo.Installer.psm1
            powershell/Mondoo.Installer/Mondoo.Installer.psd1

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.TSIGN_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.TSIGN_AZURE_TENANT_ID}}
          subscription-id: ${{ vars.TSIGN_AZURE_SUBSCRIPTION_ID }}

      - name: Sign files with Trusted Signing
        uses: azure/trusted-signing-action@db7a3a6bd3912025c705162fb7475389f5b69ec6 # v1.0.0
        with:
          endpoint: ${{ vars.TSIGN_AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TSIGN_ACCOUNT_NAME }}
          # Conditional logic for switching certificate-profile-name type
          certificate-profile-name: ${{ inputs.use-test-cert == true && vars.TSIGN_TEST_CERT_PROFILE_NAME || vars.TSIGN_CERT_PROFILE_NAME }}
          files: |
            ${{ github.workspace }}\install.ps1
            ${{ github.workspace }}\download.ps1
            ${{ github.workspace }}\powershell\Mondoo.Installer\Mondoo.Installer.psm1
            ${{ github.workspace }}\powershell\Mondoo.Installer\Mondoo.Installer.psd1
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA384
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Upload signed scripts
        if: ${{ inputs.skip-upload != true }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: signed-powershell-scripts
          path: |
            ${{ github.workspace }}\install.ps1
            ${{ github.workspace }}\download.ps1
            ${{ github.workspace }}\powershell\Mondoo.Installer\Mondoo.Installer.psm1
            ${{ github.workspace }}\powershell\Mondoo.Installer\Mondoo.Installer.psd1
          retention-days: 14

      # Branch protection on main blocks direct pushes and requires verified
      # signatures, so we open a PR via the mergebot app (commits made through
      # the GitHub API are signed by GitHub) and immediately merge it.
      - name: Configure git line endings
        if: ${{ inputs.skip-publish == false && inputs.use-test-cert == false }}
        run: |
          git config core.autocrlf false
          git config core.eol crlf

      - name: Generate mergebot token
        id: generate-token
        if: ${{ inputs.skip-publish == false && inputs.use-test-cert == false }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.MONDOO_MERGEBOT_APP_ID }}
          private-key: ${{ secrets.MONDOO_MERGEBOT_APP_PRIVATE_KEY }}

      - name: Open PR with signed scripts
        id: cpr
        if: ${{ inputs.skip-publish == false && inputs.use-test-cert == false }}
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          sign-commits: true
          commit-message: "Sign powershell scripts"
          title: "Sign powershell scripts"
          body: |
            Automated signing of PowerShell scripts produced by the
            [Sign PowerShell Scripts workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          branch: automation/sign-powershell-scripts
          delete-branch: true
          add-paths: |
            install.ps1
            download.ps1
            powershell/Mondoo.Installer/Mondoo.Installer.psm1
            powershell/Mondoo.Installer/Mondoo.Installer.psd1

      - name: Approve PR
        if: ${{ inputs.skip-publish == false && inputs.use-test-cert == false && steps.cpr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: gh pr review --approve ${{ steps.cpr.outputs.pull-request-number }}

      - name: Merge PR
        if: ${{ inputs.skip-publish == false && inputs.use-test-cert == false && steps.cpr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: gh pr merge --squash --delete-branch ${{ steps.cpr.outputs.pull-request-number }}
