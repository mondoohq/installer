---
name: License Check

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      fix:
        description: 'Fix copyright headers and open a PR with the changes'
        required: false
        default: false
        type: boolean

jobs:
  license-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout code
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

    - name: Setup Copywrite
      uses: hashicorp/setup-copywrite@32638da2d4e81d56a0764aa1547882fc4d209636 # v1.1.3

    - name: Fix Header Compliance
      if: ${{ inputs.fix }}
      run: copywrite headers

    - name: Check Header Compliance
      if: ${{ !inputs.fix }}
      run: copywrite headers --plan

    - name: Open PR with fixes
      if: ${{ inputs.fix }}
      uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb27d7f7 # v7.0.8
      with:
        commit-message: "fix: update copyright headers"
        title: "fix: update copyright headers"
        body: "Automated copyright header fixes generated by the License Check workflow."
        branch: fix/copyright-headers
        delete-branch: true
