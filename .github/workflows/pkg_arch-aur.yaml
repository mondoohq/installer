name: 'PKG: Archlinux AUR Release'

on:
  workflow_call:
    inputs:
      version:
        description: "Version to release"
        required: true
        default: "8.99.99"
        type: string
      skip:
        description: "Skip release"
        required: false
        default: false
        type: boolean
    secrets:
      AUR_USERNAME:
        required: true
      AUR_EMAIL:
        required: true
      AUR_SSH_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release"
        required: true
        default: "8.0.0"
        type: string
      skip:
        description: "Skip release"
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  update-pkgs:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    name: 'Generate & Locally Commit PKGBUILDs'
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: '>=1.17.0'
      - name: Execute generator (make update)
        run: |
          cd packages/archlinux
          make update
      - name: 'DEBUG: Show generated package versions'
        run: |
          cd packages/archlinux
          echo "mql: $(grep orignalVersion= mql/PKGBUILD)"
          echo "cnspec: $(grep orignalVersion= cnspec/PKGBUILD)"
          echo "mondoo: $(grep orignalVersion= mondoo/PKGBUILD)"
      - name: Publish mql AUR package
        if: ${{ !inputs.skip }}
        continue-on-error: true
        uses: KSXGitHub/github-actions-deploy-aur@abe8ac26b51011c88be58c8809fd2ac674068ea5 # v4.1.2
        with:
          pkgname: mql
          pkgbuild: packages/archlinux/mql/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: ${{ inputs.version }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: 'true'
      - name: Publish cnspec AUR package
        if: ${{ !inputs.skip }}
        continue-on-error: true
        uses: KSXGitHub/github-actions-deploy-aur@abe8ac26b51011c88be58c8809fd2ac674068ea5 # v4.1.2
        with:
          pkgname: cnspec
          pkgbuild: packages/archlinux/cnspec/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: ${{ inputs.version }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: 'true'
      - name: Publish mondoo AUR package
        if: ${{ !inputs.skip }}
        continue-on-error: true
        uses: KSXGitHub/github-actions-deploy-aur@abe8ac26b51011c88be58c8809fd2ac674068ea5 # v4.1.2
        with:
          pkgname: mondoo
          pkgbuild: packages/archlinux/mondoo/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: ${{ inputs.version }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: 'true'
          assets:
            packages/archlinux/mondoo/mondoo.sh
            packages/archlinux/mondoo/LICENSE.html
            packages/archlinux/mondoo/OSS-LICENSES.tar.xz
            packages/archlinux/mondoo/mondoo.service
