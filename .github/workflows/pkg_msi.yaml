name: "PKG: Microsoft Software Installer (MSI)"

on:
  workflow_call:
    inputs:
      version:
        description: "Package Version"
        required: true
        default: "0.0.1"
        type: "string"
      skip-publish:
        description: "Skip publish?"
        required: false
        default: false
        type: boolean
      bucket:
        description: "GCP Release Bucket Name"
        required: true
        default: "releases-us.mondoo.io"
        type: string
      use-test-cert:
        description: "Use test certificate profile (not publicly trusted)"
        required: false
        default: false
        type: boolean
    secrets:
      TSIGN_AZURE_CLIENT_ID:
        required: true
      GCP_CREDENTIALS:
        required: true
      INSTALL_TEST_MONDOO_REGISTRATION_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Package Version"
        required: true
        default: "0.0.1"
        type: "string"
      skip-publish:
        description: "Skip publish?"
        required: false
        default: false
        type: boolean
      bucket:
        description: "GCP Release Bucket Name"
        required: true
        default: "releases-us.mondoo.io"
        type: string
      use-test-cert:
        description: "Use test certificate profile (not publicly trusted)"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    steps:
      - name: Dump all inputs
        env:
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: echo "$INPUTS_JSON"

      - name: Ensure version of mql and cnspec are available
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi

          # Function to check URL with retry logic
          check_url_with_retry() {
            local url="$1"
            local max_attempts=3
            local wait_time=5

            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt of $max_attempts: Checking $url"
              if curl -sL --head --location --fail --connect-timeout 30 --max-time 60 --retry 2 --retry-delay 3 \
                "$url" > /dev/null; then
                echo "✓ Available: $(basename "$url")"
                return 0
              else
                echo "✗ Failed to access: $(basename "$url") (attempt $attempt)"
                if [ $attempt -lt $max_attempts ]; then
                  echo "Waiting $wait_time seconds before retry..."
                  sleep $wait_time
                fi
              fi
            done
            echo "ERROR: Failed to access $url after $max_attempts attempts"
            return 1
          }

          # Check all required URLs
          urls=(
            "https://github.com/mondoohq/mql/releases/download/v${VERSION}/mql_${VERSION}_windows_amd64.zip"
            "https://github.com/mondoohq/cnspec/releases/download/v${VERSION}/cnspec_${VERSION}_windows_amd64.zip"
            "https://github.com/mondoohq/mql/releases/download/v${VERSION}/mql_${VERSION}_windows_arm64.zip"
            "https://github.com/mondoohq/cnspec/releases/download/v${VERSION}/cnspec_${VERSION}_windows_arm64.zip"
            "https://github.com/mondoohq/mql/releases/download/v${VERSION}/mql_v${VERSION}_SHA256SUMS"
            "https://github.com/mondoohq/cnspec/releases/download/v${VERSION}/cnspec_v${VERSION}_SHA256SUMS"
          )

          failed=0
          for url in "${urls[@]}"; do
            if ! check_url_with_retry "$url"; then
              failed=1
            fi
          done

          if [ $failed -eq 1 ]; then
            echo "ERROR: One or more required binaries are not available"
            exit 1
          fi

          echo "✓ All required binaries are available for version $VERSION"

  dist-prepare:
    name: Prepare Distribution for Packaging
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Download, Verify and Extract the Binaries
        env:
          VERSION: ${{ inputs.version }}
          ARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$ARCH" != "amd64" && "$ARCH" != "arm64" ]]; then
            echo "Invalid arch: $ARCH"
            exit 1
          fi

          # Create directory and enter it
          mkdir -p "dist/${ARCH}" && cd "dist/${ARCH}"

          # Function to download with retry logic
          download_with_retry() {
            local url="$1"
            local filename="$2"
            local max_attempts=3
            local wait_time=10

            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt of $max_attempts: Downloading $filename"
              if curl -sSL --fail-with-body --connect-timeout 30 --max-time 300 --retry 3 --retry-delay 5 \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/octet-stream" \
                -o "$filename" \
                "$url"; then
                echo "Successfully downloaded $filename"
                return 0
              else
                echo "Download failed for $filename (attempt $attempt)"
                if [ $attempt -lt $max_attempts ]; then
                  echo "Waiting $wait_time seconds before retry..."
                  sleep $wait_time
                fi
              fi
            done
            echo "ERROR: Failed to download $filename after $max_attempts attempts"
            return 1
          }

          # Download checksums for validation
          if ! download_with_retry "https://github.com/mondoohq/cnspec/releases/download/v${VERSION}/cnspec_v${VERSION}_SHA256SUMS" "cnspec_v${VERSION}_SHA256SUMS"; then
            exit 1
          fi
          if ! download_with_retry "https://github.com/mondoohq/mql/releases/download/v${VERSION}/mql_v${VERSION}_SHA256SUMS" "mql_v${VERSION}_SHA256SUMS"; then
            exit 1
          fi

          # Download cnspec
          cnspec_zip="cnspec_${VERSION}_windows_${ARCH}.zip"
          if ! download_with_retry "https://github.com/mondoohq/cnspec/releases/download/v${VERSION}/${cnspec_zip}" "$cnspec_zip"; then
            exit 1
          fi

          # Validate cnspec checksum
          expected_checksum=$(grep "$cnspec_zip" "cnspec_v${VERSION}_SHA256SUMS" | awk '{print $1}')
          if [ -z "$expected_checksum" ]; then
            echo "ERROR: Could not find expected checksum for $cnspec_zip"
            exit 1
          fi
          actual_checksum=$(sha256sum "$cnspec_zip" | awk '{print $1}')
          if [ "$actual_checksum" != "$expected_checksum" ]; then
            echo "ERROR: Checksum mismatch for cnspec binary"
            echo "Expected: $expected_checksum"
            echo "Actual: $actual_checksum"
            exit 1
          fi
          echo "✓ cnspec checksum validated successfully"

          # Extract and cleanup cnspec
          if ! unzip "$cnspec_zip"; then
            echo "ERROR: Failed to extract cnspec binary"
            exit 1
          fi
          rm "$cnspec_zip" "cnspec_v${VERSION}_SHA256SUMS"

          # Download mql
          mql_zip="mql_${VERSION}_windows_${ARCH}.zip"
          if ! download_with_retry "https://github.com/mondoohq/mql/releases/download/v${VERSION}/${mql_zip}" "$mql_zip"; then
            exit 1
          fi

          # Validate mql checksum
          expected_checksum=$(grep "$mql_zip" "mql_v${VERSION}_SHA256SUMS" | awk '{print $1}')
          if [ -z "$expected_checksum" ]; then
            echo "ERROR: Could not find expected checksum for $mql_zip"
            exit 1
          fi
          actual_checksum=$(sha256sum "$mql_zip" | awk '{print $1}')
          if [ "$actual_checksum" != "$expected_checksum" ]; then
            echo "ERROR: Checksum mismatch for mql binary"
            echo "Expected: $expected_checksum"
            echo "Actual: $actual_checksum"
            exit 1
          fi
          echo "✓ mql checksum validated successfully"

          # Extract and cleanup mql
          if ! unzip "$mql_zip"; then
            echo "ERROR: Failed to extract mql binary"
            exit 1
          fi
          rm "$mql_zip" "mql_v${VERSION}_SHA256SUMS"

          echo "Successfully downloaded and extracted binaries:"
          ls -lh
      - name: Upload Distribution
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dist-${{ matrix.arch }}
          path: dist/${{ matrix.arch }}
          retention-days: 7

  msi-build:
    name: "Packaging: Windows MSI"
    environment: prod
    runs-on: windows-2025
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
    needs:
      - setup
      - dist-prepare
    #  For Version: ${{ inputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Download Distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ matrix.arch }}
          path: dist/${{ matrix.arch }}

      - name: Build MSI
        env:
          VERSION: ${{ inputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          $mondooVersion = ${env:VERSION}
          $arch = ${env:ARCH}
          if (@("amd64", "arm64") -notcontains $arch) {
            Write-Error "Invalid arch: $arch"
            exit 1
          }
          echo "Running build job for version ${mondooVersion}"
          Copy-Item ".\dist\$arch\mql.exe" .\packages\msi\msi\
          Copy-Item ".\dist\$arch\cnspec.exe" .\packages\msi\msi\
          Copy-Item ".\dist\$arch\cnspec.exe" .\packages\msi\msi\cnquery.exe
          Copy-Item ".\dist\$arch\mql.exe" .\packages\msi\appx\
          Copy-Item ".\dist\$arch\cnspec.exe" .\packages\msi\appx\
          # build msi package
          echo " - Packaging MSI..."
          Set-Location -Path '.\packages\msi\'
          ./package.ps1 -version $mondooVersion -arch $arch

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.TSIGN_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.TSIGN_AZURE_TENANT_ID}}
          subscription-id: ${{ vars.TSIGN_AZURE_SUBSCRIPTION_ID }}

      - name: Sign files with Trusted Signing
        uses: azure/artifact-signing-action@db7a3a6bd3912025c705162fb7475389f5b69ec6 # v1.0.0
        with:
          endpoint: ${{ vars.TSIGN_AZURE_ENDPOINT }}
          signing-account-name: ${{ vars.TSIGN_ACCOUNT_NAME }}
          # Conditional logic for switching certificate-profile-name type
          certificate-profile-name: ${{ inputs.use-test-cert == true && vars.TSIGN_TEST_CERT_PROFILE_NAME || vars.TSIGN_CERT_PROFILE_NAME }}
          files: |
            ${{ github.workspace }}\packages\msi\mondoo_${{ matrix.arch }}.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA384
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true
          cache-dependencies: true

      - name: Cleanup dist before upload
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          $arch = ${env:ARCH}
          if (@("amd64", "arm64") -notcontains $arch) {
            Write-Error "Invalid arch: $arch"
            exit 1
          }
          Copy-Item ".\packages\msi\mondoo_${arch}.msi" ".\dist\$arch"
          Remove-Item -Path ".\dist\$arch\mql.exe" -Force
          Remove-Item -Path ".\dist\$arch\cnspec.exe" -Force

      - name: Upload Distribution
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: msi-${{ matrix.arch }}
          path: dist/${{ matrix.arch }}
          retention-days: 7

  test-msi-install:
    name: Test Signed Package
    strategy:
      matrix:
        arch:
          - amd64
    #          - arm64 # we currently don't have windows arm64 runners to test arm against
    needs:
      - setup
      - msi-build
    runs-on: windows-2025
    steps:
      - name: Download MSI Package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: msi-${{ matrix.arch }}
          path: dist
      - name: Verify Signed MSI Status
        if: ${{ inputs.use-test-cert == false }}
        shell: powershell
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          $arch = ${env:ARCH}
          if (@("amd64", "arm64") -notcontains $arch) {
            Write-Error "Invalid arch: $arch"
            exit 1
          }
          $msiFileName = "mondoo_${arch}.msi"
          $msiFilePath = Join-Path -Path (Get-Location) -ChildPath "dist\$msiFileName"

          Write-Host "Attempting to verify digital signature for MSI: $msiFilePath"

          # --- Pre-check: Ensure the file exists ---
          if (-not (Test-Path $msiFilePath)) {
              Write-Error "Error: MSI file not found at '$msiFilePath'. Cannot verify signature."
              exit 1 # Fail the step if the file is missing
          }

          # --- Signature Verification ---
          try {
              $signature = Get-AuthenticodeSignature -FilePath $msiFilePath

              Write-Host "Signature Status: $($signature.Status)"

              if ($signature.Status -eq "Valid") {
                  Write-Host "Success: The MSI has a valid signature."
                  Write-Host "Signed by: $($signature.SignerCertificate.Subject)"
                  Write-Host "Issued by: $($signature.SignerCertificate.Issuer)"
                  Write-Host "Valid From: $($signature.SignerCertificate.NotBefore)"
                  Write-Host "Valid To: $($signature.SignerCertificate.NotAfter)"
              }
              else {
                  # For any status other than 'Valid', treat as a failure
                  Write-Error "Error: MSI signature verification failed or is not valid. Status: $($signature.Status)"

                  # Provide more context for common non-valid statuses
                  if ($signature.Status -eq "NotSigned") {
                      Write-Error "Reason: The MSI is not digitally signed."
                  } elseif ($signature.Status -eq "HashMismatch") {
                      Write-Error "Reason: The file has been tampered with since signing (hash mismatch)."
                  } elseif ($signature.Status -eq "Untrusted") {
                      Write-Error "Reason: The certificate chain could not be built to a trusted root authority."
                      # Output details of the certificate if untrusted, for debugging
                      Write-Host "Untrusted Certificate Subject: $($signature.SignerCertificate.Subject)"
                      Write-Host "Untrusted Certificate Thumbprint: $($signature.SignerCertificate.Thumbprint)"
                  } elseif ($signature.Status -eq "UnknownError") {
                      Write-Error "Reason: An unknown error occurred during signature verification."
                  }

                  exit 1 # Fail the step
              }
          }
          catch {
              Write-Error "An unexpected error occurred during signature verification: $($_.Exception.Message)"
              exit 1 # Fail the step
          }
      - name: Install artifact
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          $arch = ${env:ARCH}
          if (@("amd64", "arm64") -notcontains $arch) {
            Write-Error "Invalid arch: $arch"
            exit 1
          }
          $TEMP_PATH = $env:TEMP
          cd dist
          $msiexec = Start-Process "msiexec" "/i mondoo_${arch}.msi /qn /l*! install.log" -NoNewWindow -PassThru
          $gci = Start-Process "powershell" "Get-Content -Path install.log -Wait" -NoNewWindow -PassThru
          $msiexec.WaitForExit() 
          $gci.Kill()
          gci
      - name: Verify the correct mql version is installed
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          $version=& 'C:\Program Files\Mondoo\mql.exe' version
          Write-Output "comparing $version -like '*$env:EXPECTED_VERSION*'"
          $match=$version -like "*$env:EXPECTED_VERSION*"
          if (-not $match) {
            exit 1
          }
      - name: Run a basic mql sanity check
        run: |
          & 'C:\Program Files\Mondoo\mql.exe' run -c "os.base.packages.where(name == 'Mondoo') { name }"
      - name: Verify the correct cnspec version is installed
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          $version=& 'C:\Program Files\Mondoo\cnspec.exe' version
          Write-Output "comparing $version -like '*$env:EXPECTED_VERSION*'"
          $match=$version -like "*$env:EXPECTED_VERSION*"
          if (-not $match) {
            exit 1
          }
      - name: Run a basic cnspec sanity check
        run: |
          & 'C:\Program Files\Mondoo\cnspec.exe' run -c "os.base.packages.where(name == 'Mondoo') { name }"
      - name: Login to edge with cnspec
        env:
          REGISTRATION_TOKEN: ${{ secrets.INSTALL_TEST_MONDOO_REGISTRATION_TOKEN }}
        run: |
          & 'C:\Program Files\Mondoo\cnspec.exe' login -t "$env:REGISTRATION_TOKEN" --config C:\ProgramData\Mondoo\mondoo.yml
      - name: Run a basic cnspec sanity check
        run: |
          & 'C:\Program Files\Mondoo\cnspec.exe' policy download mondoo-windows-installer -f mondoo-windows-installer.mql.yaml
          & 'C:\Program Files\Mondoo\cnspec.exe' scan local --detect-cicd --score-threshold 100 -o full --policy-bundle mondoo-windows-installer.mql.yaml
      - name: Logout from edge with cnspec
        run: |
          & 'C:\Program Files\Mondoo\cnspec.exe' logout --config C:\ProgramData\Mondoo\mondoo.yml --force
      - name: Verify cnquery.exe points to cnspec (backward compat)
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          $version=& 'C:\Program Files\Mondoo\cnquery.exe' version
          Write-Output "comparing $version -like '*$env:EXPECTED_VERSION*'"
          $match=$version -like "*$env:EXPECTED_VERSION*"
          if (-not $match) {
            exit 1
          }

  publish:
    name: "Publish: Releases"
    if: ${{ inputs.skip-publish == false }}
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
    needs:
      - setup
      - msi-build
      - test-msi-install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Download MSI Package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: msi-${{ matrix.arch }}
          path: dist
      - name: Authenticate with Google Cloud
        id: gauth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{secrets.GCP_CREDENTIALS}}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Verify access to release bucket
        env:
          VERSION: ${{ inputs.version }}
          BUCKET: ${{ inputs.bucket }}
        run: |
          gsutil ls "gs://${BUCKET}/mondoo"
      - name: Upload static content to buckets
        env:
          VERSION: ${{ inputs.version }}
          BUCKET: ${{ inputs.bucket }}
          ARCH: ${{ matrix.arch }}
          SKIP: ${{ inputs.skip-publish && 'echo skipping...' || '' }}
        run: |
          cd dist
          if [[ "$ARCH" != "amd64" && "$ARCH" != "arm64" ]]; then
            echo "Invalid arch: $ARCH"
            exit 1
          fi
          mv "mondoo_${ARCH}.msi" "mondoo_${VERSION}_windows_${ARCH}.msi"
          sha256sum "mondoo_${VERSION}_windows_${ARCH}.msi" >> "checksums.windows_${ARCH}.txt"
          $SKIP gsutil cp "checksums.windows_${ARCH}.txt" "gs://${BUCKET}/mondoo/${VERSION}/checksums.windows_${ARCH}.txt"
          $SKIP gsutil cp "mondoo_${VERSION}_windows_${ARCH}.msi" "gs://${BUCKET}/mondoo/${VERSION}/mondoo_${VERSION}_windows_${ARCH}.msi"
      - name: Cleanup
        run: |
          rm -f "${{ steps.gauth.outputs.credentials_file_path }}"
