name: "Test Release: install.sh"

on:
  pull_request:
    paths:
      - 'install.sh'
      - 'test/auto_update/**'
      - '.github/workflows/test-released-install-sh.yaml'
  push:
    branches:
      - main
    paths:
      - 'install.sh'
      - 'test/auto_update/**'
      - '.github/workflows/test-released-install-sh.yaml'
  workflow_call:
    inputs:
      version:
        description: "Version to test"
        required: true
        default: "11.0.0"
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version to test"
        required: true
        default: "11.0.0"

permissions:
  contents: read

jobs:
  # Get version - for PR/push triggers, fetch latest; for workflow_call/dispatch, use input
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      use_local: ${{ steps.version.outputs.use_local }}
    steps:
      - name: Determine version and mode
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # workflow_call or workflow_dispatch - use provided version, don't use local install.sh
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "use_local=false" >> $GITHUB_OUTPUT
          else
            # PR or push trigger - fetch latest stable version, use local install.sh
            VERSION=$(curl -sSL https://releases.mondoo.com/mql/latest.json | jq -r '.version')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "use_local=true" >> $GITHUB_OUTPUT
          fi

  wait-for-pkg:
    runs-on: ubuntu-latest
    needs: get-version
    # Only wait for packages on release tests (workflow_call/dispatch), not PR/push
    if: ${{ needs.get-version.outputs.use_local != 'true' }}
    steps:
      - name: Wait for packages to be published (Release Event)
        id: check_release_file
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          retry_wait_seconds: 20
          timeout_seconds: 5
          max_attempts: 100
          retry_on: error
          # error on HTTP code different to 200
          command: |
            SEMVER="${{ needs.get-version.outputs.version }}"

            # Clear cache before checking (ignore failures)
            echo "Clearing minstaller's cache..."
            cache_response=$(curl -s -w "HTTP_CODE:%{http_code}" \
              -X POST https://install.mondoo.com/_/cache/clear-all \
              -H "X-API-Key: ${{ secrets.MINSTALLER_API_KEY }}" 2>/dev/null || true)

            if echo "$cache_response" | grep -q "HTTP_CODE:200"; then
              echo "✅ Cache cleared successfully"
            else
              echo "⚠️ Cache clear failed, continuing anyway..."
            fi

            # Check if package is available
            curl -o /dev/null -s -w "%{http_code}\n" "https://install.mondoo.com/package/mondoo/linux/amd64/deb/${SEMVER}/sha256" | grep 200

  install-sh-apt:
    runs-on: ubuntu-latest
    needs: [get-version, wait-for-pkg]
    # Run if wait-for-pkg succeeded OR was skipped (PR/push triggers)
    if: ${{ always() && (needs.wait-for-pkg.result == 'success' || needs.wait-for-pkg.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        package: ["cnspec", "mql"]
        distro:
          [
            "debian:11",
            "debian:12",
            "ubuntu:18.04",
            "ubuntu:20.04",
            "ubuntu:22.04",
            "ubuntu:24.04",
          ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install.sh/${{ matrix.package }} on ${{ matrix.distro }}
        run: |
          docker run --rm -v $(pwd):/work -w /work ${{ matrix.distro }} \
          bash -c "apt-get update && apt-get install -y curl && \
            curl -sSL https://install.mondoo.com/sh/${{ matrix.package }} | bash -x - && \
            ${{ matrix.package }} version | grep -q ${{ needs.get-version.outputs.version }} && \
            if [ '${{ matrix.package }}' = 'cnspec' ]; then cnquery version | grep -q ${{ needs.get-version.outputs.version }}; fi"

  install-sh-yum:
    runs-on: ubuntu-latest
    needs: [get-version, wait-for-pkg]
    if: ${{ always() && (needs.wait-for-pkg.result == 'success' || needs.wait-for-pkg.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        package: ["cnspec", "mql"]
        distro:
          [
            "quay.io/centos/centos:stream9",
            "fedora:40",
            "fedora:41",
            "rockylinux:8",
            "rockylinux:9",
            "redhat/ubi8",
            "redhat/ubi9",
            "redhat/ubi10",
            "oraclelinux:8",
            "oraclelinux:9",
          ]
        ## Note: centos:8 is obsoleted by Centos Stream 9 and EOL, do not use, refer to https://www.centos.org/centos-linux-eol/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install.sh/${{ matrix.package }} on ${{ matrix.distro }}
        run: |
          docker run --rm -v $(pwd):/work -w /work ${{ matrix.distro }} \
          bash -c "curl -sSL https://install.mondoo.com/sh/${{ matrix.package }} | bash - && \
            ${{ matrix.package }} version | grep -q ${{ needs.get-version.outputs.version }} && \
            if [ '${{ matrix.package }}' = 'cnspec' ]; then cnquery version | grep -q ${{ needs.get-version.outputs.version }}; fi"

  install-sh-zypper:
    runs-on: ubuntu-latest
    needs: [get-version, wait-for-pkg]
    if: ${{ always() && (needs.wait-for-pkg.result == 'success' || needs.wait-for-pkg.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        package: ["cnspec", "mql"]
        distro:
          [
            "registry.suse.com/suse/sle15:15.6",
          ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install.sh/${{ matrix.package }} on ${{ matrix.distro }}
        run: |
          docker run --rm -v $(pwd):/work -w /work ${{ matrix.distro }} \
          bash -c "zypper -n install curl && \
            curl -sSL https://install.mondoo.com/sh/${{ matrix.package }} | bash - && \
            ${{ matrix.package }} version | grep -q ${{ needs.get-version.outputs.version }} && \
            if [ '${{ matrix.package }}' = 'cnspec' ]; then cnquery version | grep -q ${{ needs.get-version.outputs.version }}; fi"

  install-sh-macos:
    runs-on: macos-latest
    needs: [get-version, wait-for-pkg]
    if: ${{ always() && (needs.wait-for-pkg.result == 'success' || needs.wait-for-pkg.result == 'skipped') }}
    strategy:
      matrix:
        os: ["macos-latest"]
        package: ["cnspec", "mql"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install.sh/${{ matrix.package }} on ${{ matrix.os }}
        run: |
          bash -c "$(curl -sSL https://install.mondoo.com/sh/${{ matrix.package }})"
          ${{ matrix.package }} version
      - name: Verify the correct version is installed
        run: |
          ${{ matrix.package }} version | grep -q ${{ needs.get-version.outputs.version }}
      - name: Verify cnquery symlink points to cnspec (cnspec only)
        if: matrix.package == 'cnspec'
        run: |
          cnquery version | grep -q ${{ needs.get-version.outputs.version }}

  upgrade-from-cnquery-apt:
    name: Upgrade cnquery -> mql (apt)
    runs-on: ubuntu-latest
    needs: [get-version, wait-for-pkg]
    if: ${{ always() && (needs.wait-for-pkg.result == 'success' || needs.wait-for-pkg.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        distro: ["debian:11", "debian:12", "debian:13", "ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pytest
        run: pip install pytest
      - name: Upgrade cnquery -> mql on ${{ matrix.distro }}
        run: |
          pytest test/auto_update/test_install_sh.py -v \
            --install-version "${{ needs.get-version.outputs.version }}" \
            --distro "${{ matrix.distro }}" \
            --install-sh-upgrade-from "12.0.0" \
            ${{ needs.get-version.outputs.use_local == 'true' && '--use-local-install-sh' || '' }}

  upgrade-from-cnquery-yum:
    name: Upgrade cnquery -> mql (yum)
    runs-on: ubuntu-latest
    needs: [get-version, wait-for-pkg]
    if: ${{ always() && (needs.wait-for-pkg.result == 'success' || needs.wait-for-pkg.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        distro: ["quay.io/centos/centos:stream9", "rockylinux:8", "rockylinux:9", "oraclelinux:8", "oraclelinux:9"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pytest
        run: pip install pytest
      - name: Upgrade cnquery -> mql on ${{ matrix.distro }}
        run: |
          pytest test/auto_update/test_install_sh.py -v \
            --install-version "${{ needs.get-version.outputs.version }}" \
            --distro "${{ matrix.distro }}" \
            --install-sh-upgrade-from "12.0.0" \
            ${{ needs.get-version.outputs.use_local == 'true' && '--use-local-install-sh' || '' }}

  upgrade-from-cnquery-zypper:
    name: Upgrade cnquery -> mql (zypper)
    runs-on: ubuntu-latest
    needs: [get-version, wait-for-pkg]
    if: ${{ always() && (needs.wait-for-pkg.result == 'success' || needs.wait-for-pkg.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        distro: ["registry.suse.com/suse/sle15:15.6"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pytest
        run: pip install pytest
      - name: Upgrade cnquery -> mql on ${{ matrix.distro }}
        run: |
          pytest test/auto_update/test_install_sh.py -v \
            --install-version "${{ needs.get-version.outputs.version }}" \
            --distro "${{ matrix.distro }}" \
            --install-sh-upgrade-from "12.0.0" \
            ${{ needs.get-version.outputs.use_local == 'true' && '--use-local-install-sh' || '' }}
